models:
  - name: products
    description: Product overview data mart, offering key details and sales metrics for each product. One row per product.
    columns:
      - name: product_id
        description: The unique key for each product.
        data_tests:
          - not_null
          - unique
      - name: product_name
        description: The name of the product.
      - name: product_type
        description: The category/type of the product (jaffle or beverage).
      - name: product_price
        description: The price of the product in dollars.
      - name: is_food_item
        description: Boolean indicating if this is a food item.
      - name: is_drink_item
        description: Boolean indicating if this is a drink item.
      - name: count_orders
        description: Total number of times this product has been ordered.
      - name: total_revenue
        description: Total revenue generated by this product.
      - name: gross_profit
        description: Total revenue minus total supply cost for this product.
