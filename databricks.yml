bundle:
  name: dbt-databricks-training

variables:
  warehouse_id:
    description: "SQL Warehouse ID for dbt execution"
    default: "8baced1ff014912d"

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://e2-demo-field-eng.cloud.databricks.com
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

resources:
  jobs:
    jaffle_shop_dbt_job:
      name: "[${bundle.target}] Jaffle Shop - dbt Build"
      description: >
        Lakeflow Job to run the Jaffle Shop dbt project.
        Executes dbt deps, seed, run, and test sequentially using
        the Shared SQL Warehouse against dbt_databricks_training_internal catalog.

      environments:
        - environment_key: dbt_env
          spec:
            client: "1"
            dependencies:
              - dbt-databricks>=1.8.0,<2.0.0

      tasks:
        - task_key: dbt_build
          environment_key: dbt_env
          dbt_task:
            source: WORKSPACE
            project_directory: jaffle_shop
            commands:
              - "dbt deps"
              - "dbt seed --full-refresh --vars '{\"load_source_data\": true}'"
              - "dbt run"
              - "dbt test"
            warehouse_id: ${var.warehouse_id}
            catalog: dbt_databricks_training_internal
            schema: jaffle_shop

      email_notifications:
        on_failure:
          - ash.sultan@databricks.com
